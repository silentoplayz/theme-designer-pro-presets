<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Designer Pro — Preset Gallery</title>
  <meta name="description" content="Browse, preview, and install curated theme presets, canvas effects, CSS presets, gradients, and bundles for Theme Designer Pro.">
  <meta name="theme-color" content="#09090b">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta property="og:title" content="Theme Designer Pro — Preset Gallery">
  <meta property="og:description" content="A curated collection of premium themes, effects, and presets for Open WebUI.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://silentoplayz.github.io/theme-designer-pro-presets/">
  <meta property="og:image" content="https://raw.githubusercontent.com/silentoplayz/theme-designer-pro-presets/main/docs/og-preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Ambient background effects -->
  <div class="ambient-glow" aria-hidden="true"></div>
  <div class="grain-overlay" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo" aria-label="Theme Designer Pro">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        <span>Theme Designer Pro</span>
      </a>
      <nav class="header-links">
        <a href="https://github.com/silentoplayz/theme-designer-pro-presets/issues/new?template=theme-submission.yml" target="_blank" rel="noopener noreferrer" class="header-link submit-cta">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Submit</span>
        </a>
        <a href="https://github.com/silentoplayz/theme-designer-pro-presets" target="_blank" rel="noopener noreferrer" class="header-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          <span>GitHub</span>
        </a>
        <a href="https://github.com/silentoplayz/theme-designer-pro-presets/discussions" target="_blank" rel="noopener noreferrer" class="header-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Community</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="hero-badge">Open WebUI Presets</div>
      <h1 class="hero-title">
        <span class="hero-title-line">Theme Designer</span>
        <span class="hero-title-accent">Pro</span>
      </h1>
      <p class="hero-subtitle">Preset Gallery</p>
      <p class="hero-desc">Browse, preview, and install curated themes, effects, and presets for Open WebUI.</p>
    </section>

    <!-- Controls -->
    <section class="controls">
      <div class="search-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="search-input" class="search-input" placeholder="Search presets…" autocomplete="off">
      </div>
      <nav class="category-tabs" role="tablist" aria-label="Preset categories">
        <button class="tab active" role="tab" data-category="themes" aria-selected="true">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          Themes
          <span class="tab-count" id="count-themes">0</span>
        </button>
        <button class="tab" role="tab" data-category="canvasFx" aria-selected="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275z"/></svg>
          Canvas FX
          <span class="tab-count" id="count-canvasFx">0</span>
        </button>
        <button class="tab" role="tab" data-category="cssPresets" aria-selected="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          CSS
          <span class="tab-count" id="count-cssPresets">0</span>
        </button>
        <button class="tab" role="tab" data-category="gradients" aria-selected="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M2 12h20"/><path d="M12 2v20"/></svg>
          Gradients
          <span class="tab-count" id="count-gradients">0</span>
        </button>
        <button class="tab" role="tab" data-category="bundles" aria-selected="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Bundles
          <span class="tab-count" id="count-bundles">0</span>
        </button>
      </nav>
    </section>

    <!-- Toolbar: sort (all categories) + filters (themes only) -->
    <section id="toolbar" class="toolbar">
      <div class="toolbar-inner">
        <div class="sort-group">
          <label for="sort-select" class="sort-label">Sort by</label>
          <select id="sort-select" class="sort-select">
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
          </select>
        </div>
        <div class="filter-chips" id="filter-chips">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="gradient">Gradient</button>
          <button class="chip" data-filter="canvas-fx">Canvas FX</button>
          <button class="chip" data-filter="custom-css">Custom CSS</button>
          <button class="chip" data-filter="overrides">Overrides</button>
        </div>
      </div>
    </section>

    <!-- Card grid -->
    <section class="grid-section">
      <div id="card-grid" class="card-grid"></div>
      <div id="empty-state" class="empty-state hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <p>No presets found matching your search.</p>
      </div>
      <div id="loading-state" class="loading-state">
        <div class="spinner"></div>
        <p>Loading presets…</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Made with care for the <a href="https://openwebui.com" target="_blank" rel="noopener noreferrer">Open WebUI</a> community</p>
  </footer>

  <!-- Detail modal -->
  <div id="detail-modal" class="detail-overlay" aria-hidden="true">
    <div class="detail-panel" role="dialog" aria-modal="true">
      <button class="detail-close" id="detail-close-btn" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Live preview overlay -->
  <div id="preview-overlay" class="preview-overlay" aria-hidden="true">
    <div id="preview-stage" class="preview-stage" aria-live="off"></div>
    <div class="preview-topbar">
      <div class="preview-titlebox">
        <span class="preview-label">Live Preview</span>
        <span id="preview-title" class="preview-title"></span>
      </div>
      <div id="preview-controls" class="preview-controls-box"></div>
      <button class="preview-close" id="preview-close-btn" aria-label="Close preview">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div id="preview-status" class="preview-status" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
  <script src="preview.js"></script>
</body>
</html>
