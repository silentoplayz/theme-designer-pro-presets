name: Build Bundles

on:
  push:
    branches: [main]
    paths:
      - 'canvas-fx/**'
      - 'css-presets/**'
      - 'themes/**'
      - 'gradients/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build bundles
        run: node scripts/build-bundles.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet bundles/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated bundles
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bundles/
          git commit -m "chore: auto-regenerate bundles [skip ci]"
          git push
