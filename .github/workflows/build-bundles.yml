name: Validate & Build Bundles

on:
  push:
    branches: [main]
    paths:
      - 'canvas-fx/**'
      - 'css-presets/**'
      - 'themes/**'
      - 'gradients/**'
      - 'schemas/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'canvas-fx/**'
      - 'css-presets/**'
      - 'themes/**'
      - 'gradients/**'

# Cancel in-flight builds when a new push arrives — only the latest matters
concurrency:
  group: build-bundles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate presets
        run: node scripts/validate.js

  build:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so rebase works if remote moved
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build bundles
        run: node scripts/build-bundles.js

      - name: Build manifest
        run: node scripts/build-manifest.js

      - name: Update badge counts
        run: node scripts/update-badges.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet bundles/ manifest.json README.md && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated artifacts
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bundles/ manifest.json README.md
          git commit -m "chore: auto-update bundles, manifest, and badges [skip ci]"
          # Rebase onto latest remote in case another push landed while we built
          git pull --rebase origin main
          git push
